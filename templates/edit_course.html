{% extends "base.html" %}

{% block title %}Edit Course - E-Learning Portal{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Edit Course</h1>
        <p class="text-gray-600">Update your course information</p>
    </div>

    <div class="bg-white rounded-lg shadow-md p-8">
        <form method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700 mb-2">Course Title</label>
                <input type="text" id="title" name="title" value="{{ course.title }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea id="description" name="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">{{ course.description }}</textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="category" class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                    <select id="category" name="category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="programming" {% if course.category == 'programming' %}selected{% endif %}>Programming</option>
                        <option value="web-development" {% if course.category == 'web-development' %}selected{% endif %}>Web Development</option>
                        <option value="data-science" {% if course.category == 'data-science' %}selected{% endif %}>Data Science</option>
                        <option value="machine-learning" {% if course.category == 'machine-learning' %}selected{% endif %}>Machine Learning</option>
                        <option value="design" {% if course.category == 'design' %}selected{% endif %}>Design</option>
                        <option value="business" {% if course.category == 'business' %}selected{% endif %}>Business</option>
                        <option value="other" {% if course.category == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div>
                    <label for="difficulty_level" class="block text-sm font-medium text-gray-700 mb-2">Difficulty Level</label>
                    <select id="difficulty_level" name="difficulty_level" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="beginner" {% if course.difficulty_level == 'beginner' %}selected{% endif %}>Beginner</option>
                        <option value="intermediate" {% if course.difficulty_level == 'intermediate' %}selected{% endif %}>Intermediate</option>
                        <option value="advanced" {% if course.difficulty_level == 'advanced' %}selected{% endif %}>Advanced</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="price" class="block text-sm font-medium text-gray-700 mb-2">Price ($)</label>
                    <input type="number" id="price" name="price" value="{{ course.price }}" min="0" step="0.01" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label for="duration_hours" class="block text-sm font-medium text-gray-700 mb-2">Duration (hours)</label>
                    <input type="number" id="duration_hours" name="duration_hours" value="{{ course.duration_hours }}" min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div>
                <label class="flex items-center gap-2">
                    <input type="checkbox" name="is_published" {% if course.is_published %}checked{% endif %} class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm font-medium text-gray-700">Published (visible to students)</span>
                </label>
            </div>

            <div class="flex gap-4 pt-6">
                <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Save Changes</button>
                <a href="{{ url_for('edit_course', course_id=course.id) }}" class="bg-gray-200 text-gray-900 px-6 py-3 rounded-lg font-semibold hover:bg-gray-300 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
