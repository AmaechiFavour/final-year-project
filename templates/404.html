{% extends "base.html" %}

{% block title %}Page Not Found - E-Learning Portal{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
    <div class="mb-6">
        <h1 class="text-6xl font-bold text-gray-900 mb-2">404</h1>
        <p class="text-2xl text-gray-600 mb-4">Page Not Found</p>
        <p class="text-gray-600 mb-8">Sorry, the page you're looking for doesn't exist.</p>
    </div>

    <div class="space-y-4">
        <a href="{{ url_for('index') }}" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Go Home</a>
        <a href="javascript:history.back()" class="inline-block bg-gray-200 text-gray-900 px-8 py-3 rounded-lg font-semibold hover:bg-gray-300 transition ml-4">Go Back</a>
    </div>
</div>
{% endblock %}
