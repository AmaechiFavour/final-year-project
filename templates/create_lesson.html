{% extends "base.html" %}

{% block title %}Create Lesson - E-Learning Portal{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Create New Lesson</h1>
        <p class="text-gray-600">Add a lesson to {{ course.title }}</p>
    </div>

    <div class="bg-white rounded-lg shadow-md p-8">
        <form method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700 mb-2">Lesson Title *</label>
                <input type="text" id="title" name="title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., Introduction to Variables">
            </div>

            <div>
                <label for="content" class="block text-sm font-medium text-gray-700 mb-2">Lesson Content *</label>
                <textarea id="content" name="content" rows="6" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Write your lesson content here..."></textarea>
                <p class="text-xs text-gray-600 mt-1">You can use basic markdown or HTML</p>
            </div>

            <div>
                <label for="video_url" class="block text-sm font-medium text-gray-700 mb-2">Video URL (Optional)</label>
                <input type="url" id="video_url" name="video_url" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://youtu.be/...">
            </div>

            <div>
                <label for="order" class="block text-sm font-medium text-gray-700 mb-2">Lesson Order</label>
                <input type="number" id="order" name="order" value="{{ course.lessons|length + 1 }}" min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex gap-4 pt-6">
                <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700">Create Lesson</button>
                <a href="{{ url_for('manage_course', course_id=course.id) }}" class="bg-gray-200 text-gray-900 px-6 py-3 rounded-lg font-semibold hover:bg-gray-300">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
