{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900">Review Course</h1>
            <p class="text-lg text-gray-600">{{ course.title }}</p>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <form method="POST" class="space-y-6">
                <!-- Rating -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 mb-3">Rating</label>
                    <div class="flex gap-2">
                        {% for i in range(1, 6) %}
                        <input type="radio" id="rating_{{ i }}" name="rating" value="{{ i }}" 
                               {% if existing_review and existing_review.rating == i %}checked{% elif i == 5 and not existing_review %}checked{% endif %} 
                               class="hidden" />
                        <label for="rating_{{ i }}" class="cursor-pointer">
                            <svg class="w-12 h-12 transition hover:scale-110" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
                            </svg>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <!-- Title -->
                <div>
                    <label for="title" class="block text-sm font-semibold text-gray-900 mb-2">Review Title</label>
                    <input type="text" id="title" name="title" 
                           value="{% if existing_review %}{{ existing_review.title }}{% endif %}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="Summarize your experience..." />
                </div>

                <!-- Review -->
                <div>
                    <label for="review_text" class="block text-sm font-semibold text-gray-900 mb-2">Your Review</label>
                    <textarea id="review_text" name="review_text" rows="6"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                              placeholder="Share your thoughts about this course...">{% if existing_review %}{{ existing_review.review_text }}{% endif %}</textarea>
                </div>

                <!-- Actions -->
                <div class="flex gap-3 pt-4">
                    <button type="submit" 
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition">
                        {% if existing_review %}Update Review{% else %}Post Review{% endif %}
                    </button>
                    <a href="{{ url_for('view_course_reviews', course_id=course.id) }}" 
                       class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-6 rounded-lg transition">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
<style>
input[type="radio"]:checked + label svg,
input[type="radio"]:checked ~ label:not(:has(+ label input)) svg,
label:has(input:checked) svg {
    @apply text-yellow-400;
}
label:hover svg {
    @apply text-yellow-300;
}
</style>
{% endblock %}
