{% extends "base.html" %}

{% block title %}Edit {{ lesson.title }} - E-Learning Portal{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Edit Lesson</h1>
        <p class="text-gray-600">Update lesson in {{ lesson.course.title }}</p>
    </div>

    <div class="bg-white rounded-lg shadow-md p-8">
        <form method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700 mb-2">Lesson Title</label>
                <input type="text" id="title" name="title" value="{{ lesson.title }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="content" class="block text-sm font-medium text-gray-700 mb-2">Lesson Content</label>
                <textarea id="content" name="content" rows="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">{{ lesson.content }}</textarea>
            </div>

            <div>
                <label for="video_url" class="block text-sm font-medium text-gray-700 mb-2">Video URL (Optional)</label>
                <input type="url" id="video_url" name="video_url" value="{{ lesson.video_url or '' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="order" class="block text-sm font-medium text-gray-700 mb-2">Lesson Order</label>
                <input type="number" id="order" name="order" value="{{ lesson.order or 1 }}" min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex gap-4 pt-6">
                <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700">Save Changes</button>
                <a href="{{ url_for('manage_course', course_id=lesson.course_id) }}" class="bg-gray-200 text-gray-900 px-6 py-3 rounded-lg font-semibold hover:bg-gray-300">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
